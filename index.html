<p>双指针常用于：</p>
<ul>
<li>有序数组查找</li>
<li>区间维护</li>
<li>去重</li>
<li>滑动窗口</li>
<li>字符串处理</li>
</ul></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/%E6%95%B0%E8%AE%BA%E4%B8%8E%E7%AE%97%E6%B3%95%E5%BA%94%E7%94%A8%E4%B9%8B%E5%BF%AB%E9%80%9F%E5%B9%82/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/Number-Theory/">Number Theory</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/Algorithm/">Algorithm</a></object><object><a href="/tags/Number-Theory/">Number Theory</a></object><object><a href="/tags/Fast-Power/">Fast Power</a></object></span><time datetime="2026-03-20T04:30:00.000Z">2026-03-20</time></div><h1 class="recent-title">数论与算法应用之快速幂</h1><div class="recent-excerpt"><hr><p>快速幂是一种高效计算幂的方法</p>
<p>它的核心思想可以概括为一句话：</p>
<p><strong>把指数拆成二进制，用平方来加速计算</strong></p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E5%B9%B6%E6%9F%A5%E9%9B%86/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/Algorithm-Notes/">Algorithm Notes</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/Algorithm/">Algorithm</a></object><object><a href="/tags/Union-Find/">Union Find</a></object></span><time datetime="2026-03-20T04:15:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之并查集</h1><div class="recent-excerpt"><hr><p>并查集是一种非常经典的数据结构，英文常叫 <strong>Union-Find</strong>。<br>它主要用于处理这类问题：</p>
<p><strong>某两个元素是否属于同一个集合。</strong></p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E5%89%8D%E7%BC%80%E5%92%8C%E4%B8%8E%E5%B7%AE%E5%88%86/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/Algorithm-Notes/">Algorithm Notes</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/Algorithm/">Algorithm</a></object><object><a href="/tags/Prefix-Sum/">Prefix Sum</a></object><object><a href="/tags/Difference-Array/">Difference Array</a></object></span><time datetime="2026-03-20T04:00:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之前缀和与差分</h1><div class="recent-excerpt"><hr><p>前缀和与差分是算法题中非常常见的一组基础技巧<br>它们本质上都是为了让“区间处理”变得更高效</p>
<p>前缀和擅长解决：</p>
<ul>
<li>快速求区间和</li>
<li>快速统计某段区间的信息</li>
</ul>
<p>差分擅长解决：</p>
<ul>
<li>快速进行区间加减操作</li>
<li>批量修改数组</li>
</ul></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/%E6%95%B0%E8%AE%BA%E4%B8%8E%E7%AE%97%E6%B3%95%E5%BA%94%E7%94%A8%E4%B9%8B%E6%AC%A7%E5%87%A0%E9%87%8C%E5%BE%97%E7%AE%97%E6%B3%95/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/%E6%95%B0%E8%AE%BA/">数论</a></object><object><a href="/tags/%E6%9C%80%E5%A4%A7%E5%85%AC%E7%BA%A6%E6%95%B0/">最大公约数</a></object></span><time datetime="2026-03-20T03:30:00.000Z">2026-03-20</time></div><h1 class="recent-title">数论与算法应用之欧几里得算法</h1><div class="recent-excerpt"><hr><p>欧几里得算法，也叫<strong>辗转相除法</strong>，是求两个整数最大公约数的经典方法。<br>它不仅写法简洁，而且效率非常高，是数论中最基础的工具之一</p>
<p>它的核心思想可以概括为一句话：</p>
<p><strong>两个数的最大公约数，等于较小的数和余数的最大公约数。</strong></p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E4%BA%8C%E5%88%86%E6%9F%A5%E6%89%BE/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/%E4%BA%8C%E5%88%86/">二分</a></object></span><time datetime="2026-03-20T03:15:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之二分查找</h1><div class="recent-excerpt"><hr><p>二分查找是一种非常高效的查找方法<br>当数据已经有序时，它可以大幅减少查找次数</p>
<p>二分查找的核心思想可以概括为一句话：</p>
<p><strong>每次把查找区间缩小一半</strong></p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E5%B9%BF%E5%BA%A6%E4%BC%98%E5%85%88%E6%90%9C%E7%B4%A2/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/BFS/">BFS</a></object></span><time datetime="2026-03-20T03:00:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之广度优先搜索</h1><div class="recent-excerpt"><hr><p>广度优先搜索，英文叫 <strong>Breadth First Search</strong>，通常简称 <strong>BFS</strong>。<br>它是一种非常经典的搜索算法，常用于图的遍历、迷宫最短路、状态转移等问题<br>BFS 的核心思想可以概括为一句话：</p>
<p><strong>从起点开始，一层一层向外扩展。</strong></p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/%E6%95%B0%E8%AE%BA%E4%B8%8E%E7%AE%97%E6%B3%95%E5%BA%94%E7%94%A8%E4%B9%8B%E8%B4%A8%E6%95%B0%E6%80%A7%E8%B4%A8%E4%B8%8E%E5%9F%BA%E7%A1%80%E8%B4%A8%E6%95%B0%E7%AD%9B/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/%E6%95%B0%E8%AE%BA/">数论</a></object><object><a href="/tags/%E8%B4%A8%E6%95%B0/">质数</a></object></span><time datetime="2026-03-20T02:30:00.000Z">2026-03-20</time></div><h1 class="recent-title">数论与算法应用之质数性质与基础质数筛</h1><div class="recent-excerpt"><hr><p>质数是数论中最基础、最重要的概念之一。<br>在算法题中，质数相关知识也经常出现，例如：</p>
<ul>
<li>判断一个数是不是质数</li>
<li>求某个范围内的所有质数</li>
<li>分解质因数</li>
<li>与最大公约数、最小公倍数结合考查</li>
</ul>
<p>因此，掌握质数的基本性质和基础筛法非常重要</p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E6%B7%B1%E6%90%9C%E7%9A%84%E5%89%AA%E6%9E%9D%E6%8A%80%E5%B7%A7/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/DFS/">DFS</a></object><object><a href="/tags/%E5%89%AA%E6%9E%9D/">剪枝</a></object></span><time datetime="2026-03-20T02:15:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之深搜的剪枝技巧</h1><div class="recent-excerpt"><hr><p>在使用深度优先搜索时，如果把所有情况都无脑搜索一遍，往往会非常慢。<br>这时就需要一种优化方法：<strong>剪枝</strong></p>
<p>所谓剪枝，就是：</p>
<p><strong>在搜索过程中，提前判断某些分支不可能产生最优解或合法解，于是直接停止继续搜索</strong></p>
<p>这样就能大大减少搜索量，提高运行效率</p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E6%B7%B1%E5%BA%A6%E4%BC%98%E5%85%88%E6%90%9C%E7%B4%A2/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/DFS/">DFS</a></object></span><time datetime="2026-03-20T02:00:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之深度优先搜索</h1><div class="recent-excerpt"><hr><p>深度优先搜索，英文叫 <strong>Depth First Search</strong>，通常简称 <strong>DFS</strong>。<br>它是一种非常基础但非常重要的搜索算法，在图论、迷宫、排列组合、回溯等问题中都有广泛应用。</p>
<p>DFS 的核心思想可以概括为一句话：</p>
<p><strong>先沿着一条路一直走到底，走不通了再回头</strong></p></div><span class="read-more">阅读文章 +</span></object></a></div><div id="paginator"><span class="page-number current">1</span><a class="page-number" href="/page/2/">2</a><a class="extend next" rel="next" href="/page/2/">Next</a></div><div class="bottom-btn"><div><a class="i-top" id="to-top" onClick="scrolls.scrolltop();" title="回到顶部" style="opacity: 0; display: none;">∧ </a><a class="i-color" id="color-mode" onClick="colorMode.change()" title="切换主题"></a></div></div></article><aside><div id="about"><a href="/" id="logo"><img src="https://ak.hypergryph.com/assets/index/images/ak/pc/faction/1.png" alt="Logo" style="margin:0;border-radius:0;"></a><h1 id="Dr"><a href="/">与猫为邻</a></h1><div id="description"><p></p></div><div id="social-links"><a class="social" target="_blank" rel="noopener" href="https://github.com/YuMaoWeiLin"><i class="fab fa-github" alt="GitHub"></i></a></div></div><div id="aside-block"><section id="total"><a id="total-archives" href="/archives"><span class="total-title">文章 总数:</span><span class="total-number">15</span></a><div id="total-tags"><span class="total-title">标签:</span><span class="total-number">19</span></div><div id="total-categories"><span class="total-title">分类:</span><span class="total-number">4</span></div></section></div><footer><nobr>构建自 <a target="_blank" rel="noopener" href="http://hexo.io">Hexo</a></nobr><wbr><nobr> 使用主题 <a target="_blank" rel="noopener" href="https://github.com/Yue-plus/hexo-theme-arknights">Arknights</a></nobr><wbr><nobr> 主题作者 <a target="_blank" rel="noopener" href="https://github.com/Yue-plus">Yue_plus</a></nobr></footer></aside></main><canvas id="canvas-dust"></canvas><script defer src="/js/music-player.js"></script><script defer src="/js/waifu-interact.js"></script><script src="/live2dw/lib/L2Dwidget.min.js?094cbace49a39548bed64abff5988b05"></script><script>L2Dwidget.init({"pluginRootPath":"live2dw/","pluginJsPath":"lib/","pluginModelPath":"assets/","tagMode":false,"log"
