<ul>
<li>判断一个数是不是质数</li>
<li>求某个范围内的所有质数</li>
<li>分解质因数</li>
<li>与最大公约数、最小公倍数结合考查</li>
</ul>
<p>因此，掌握质数的基本性质和基础筛法非常重要</p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E6%B7%B1%E6%90%9C%E7%9A%84%E5%89%AA%E6%9E%9D%E6%8A%80%E5%B7%A7/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/DFS/">DFS</a></object><object><a href="/tags/%E5%89%AA%E6%9E%9D/">剪枝</a></object></span><time datetime="2026-03-20T02:15:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之深搜的剪枝技巧</h1><div class="recent-excerpt"><hr><p>在使用深度优先搜索时，如果把所有情况都无脑搜索一遍，往往会非常慢。<br>这时就需要一种优化方法：<strong>剪枝</strong></p>
<p>所谓剪枝，就是：</p>
<p><strong>在搜索过程中，提前判断某些分支不可能产生最优解或合法解，于是直接停止继续搜索</strong></p>
<p>这样就能大大减少搜索量，提高运行效率</p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/20/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E6%B7%B1%E5%BA%A6%E4%BC%98%E5%85%88%E6%90%9C%E7%B4%A2/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/DFS/">DFS</a></object></span><time datetime="2026-03-20T02:00:00.000Z">2026-03-20</time></div><h1 class="recent-title">C++基础算法之深度优先搜索</h1><div class="recent-excerpt"><hr><p>深度优先搜索，英文叫 <strong>Depth First Search</strong>，通常简称 <strong>DFS</strong>。<br>它是一种非常基础但非常重要的搜索算法，在图论、迷宫、排列组合、回溯等问题中都有广泛应用。</p>
<p>DFS 的核心思想可以概括为一句话：</p>
<p><strong>先沿着一条路一直走到底，走不通了再回头</strong></p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/17/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E9%AB%98%E7%B2%BE%E5%BA%A6%E4%B9%98%E6%B3%95/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/%E9%AB%98%E7%B2%BE%E5%BA%A6/">高精度</a></object></span><time datetime="2026-03-17T13:10:00.000Z">2026-03-17</time></div><h1 class="recent-title">C++基础算法之高精度乘法</h1><div class="recent-excerpt"><hr><p>高精度乘法用于处理超出普通整型范围的大整数相乘问题。它的核心思想是模拟竖式乘法，通过数组保存每一位数字，并统一处理进位。</p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/17/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E9%AB%98%E7%B2%BE%E5%BA%A6%E9%99%A4%E6%B3%95/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/%E9%AB%98%E7%B2%BE%E5%BA%A6/">高精度</a></object></span><time datetime="2026-03-17T10:20:00.000Z">2026-03-17</time></div><h1 class="recent-title">C++基础算法之高精度除法</h1><div class="recent-excerpt"><hr><p align="center">
  <img src="/img/4.jpg" alt="图片1" style="width: 38%; height: auto; margin: 6px;">
  <img src="/img/3.jpg" alt="图片2" style="width: 38%; height: auto; margin: 6px;">
</p>

<p>高精度除法通常用于解决“大整数除以普通整数”的问题。它的核心思想是模拟手算除法，从高位到低位依次处理，并不断更新余数。</p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/17/C-%E5%9F%BA%E7%A1%80%E7%AE%97%E6%B3%95%E4%B9%8B%E9%AB%98%E7%B2%BE%E5%BA%A6%E5%8A%A0%E6%B3%95/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E7%AE%97%E6%B3%95%E5%AD%A6%E4%B9%A0/">算法学习</a></object></span><span class="tags"><object><a href="/tags/C/">C++</a></object><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object><object><a href="/tags/%E9%AB%98%E7%B2%BE%E5%BA%A6/">高精度</a></object></span><time datetime="2026-03-17T04:00:00.000Z">2026-03-17</time></div><h1 class="recent-title">C++基础算法之高精度加法</h1><div class="recent-excerpt"><hr><p>高精度加法用于处理超出普通整型范围的大整数相加问题。它的核心思想是模拟竖式加法，按位相加并处理进位。</p></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/15/%E8%B4%AA%E5%BF%83%E7%AE%97%E6%B3%95%E7%AE%80%E4%BB%8B/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E5%AD%A6%E4%B9%A0/">学习</a></object></span><span class="tags"><object><a href="/tags/%E7%AE%97%E6%B3%95/">算法</a></object></span><time datetime="2026-03-15T04:00:00.000Z">2026-03-15</time></div><h1 class="recent-title">贪心算法简介</h1><div class="recent-excerpt"></div><span class="read-more">阅读文章 +</span></object></a><a class="recent-post" href="/2026/03/14/hello-world/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/%E5%AD%A6%E4%B9%A0/">学习</a></object></span><span class="tags"><object><a href="/tags/C%E8%AF%AD%E8%A8%80/">C语言</a></object><object><a href="/tags/%E5%85%A5%E9%97%A8/">入门</a></object></span><time datetime="2026-03-14T04:00:00.000Z">2026-03-14</time></div><h1 class="recent-title">Hello World</h1><div class="recent-excerpt"></div><span class="read-more">阅读文章 +</span></object></a></div><div id="paginator"><a class="extend prev" rel="prev" href="/">Prev</a><a class="page-number" href="/">1</a><span cla
